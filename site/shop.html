<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eleganza | المقتنيات</title>
  <meta name="description" content="مقتنيات إيليجانزا بصياغة تحريرية راقية، مع فصل واضح بين القطع الحصرية والمقتنيات المتاحة للطلب الخاص." />
  <meta property="og:title" content="إيليجانزا | المقتنيات" />
  <meta property="og:description" content="صفحة مجموعة أقرب إلى مجلة أزياء راقية من متجر تقليدي." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/images/brand-mark.png" />
  <link rel="icon" href="assets/images/brand-mark.png" type="image/png" />
  <link rel="stylesheet" href="assets/styles.css" />
  <script defer src="assets/products.js"></script>
  <script defer src="assets/app.js"></script>
</head>
<body data-page="shop">
  <div data-site-header></div>

  <main class="page-products">
    <section class="page-hero" data-reveal>
      <div class="shell">
        <div class="page-hero__panel">
          <span class="eyebrow">المقتنيات</span>
          <h1>مجموعة تُقرأ<br />مثل افتتاحية أزياء</h1>
          <p>
            تم تقليل الضوضاء البصرية إلى الحد الأدنى، بحيث تظهر كل قطعة كاختيار مستقل يحمل
            قصته ومكانته، لا كبطاقة داخل متجر مزدحم.
          </p>
        </div>
      </div>
    </section>

    <section class="section section--light">
      <div class="shell">
        <div class="filter-row" data-shop-filters data-reveal>
          <button class="filter-button is-selected" type="button" data-filter="all">كل المقتنيات</button>
          <button class="filter-button" type="button" data-filter="exclusive">الحصرية 2026</button>
          <button class="filter-button" type="button" data-filter="regular">الطلب الخاص</button>
        </div>

        <p class="collection-count" data-shop-count></p>
        <div data-collection-spotlight></div>
        <div class="curation-grid" data-shop-grid></div>
      </div>
    </section>
  </main>

  <div data-site-footer></div>
</body>
</html>
